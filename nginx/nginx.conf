events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging con info de upstream (para ver el balanceo)
    log_format  upstream_info '$remote_addr - [$time_local] '
                              '"$request" $status '
                              'upstream: $upstream_addr '
                              'rt: $request_time';

    access_log /var/log/nginx/access.log upstream_info;

    # ─── Upstream: el servicio de API en Swarm ───────────────────────────────
    # Docker Swarm resuelve "api" a las IPs de todos los contenedores del
    # servicio via DNS round-robin interno
    upstream api_backend {
        least_conn;
        server api:3000;
        keepalive 0;
    }

    # ─── Upstream: el servicio web ────────────────────────────────────────────
    upstream web_backend {
        server web:80;
    }

    server {
        listen 80;
        server_name _;

        # Headers de debug — muestran qué upstream respondió
        add_header X-Proxy "nginx-lb" always;
        add_header X-Upstream $upstream_addr always;

        # ── Web frontend ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── API backend ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS ya lo maneja el API, esto solo pasa headers
            proxy_set_header   Connection "";
            proxy_read_timeout 30s;
        }

        # ── Health check del propio nginx ─────────────────────────────────────
        location /nginx-health {
            return 200 '{"status":"nginx-ok","hostname":"$hostname"}';
            add_header Content-Type application/json;
        }
    }
}
